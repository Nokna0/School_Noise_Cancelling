<!DOCTYPE html>

<!--
  audiosep/static/index.html

  4-모듈 구조:
    Module 1 – 오디오 수집 & 딜레이  (app.js: captureAudio)
    Module 2 – AI 참조 신호 추출     (server.py: fake_audiosep / AudioSep)
    Module 3 – 시간 동기화 & NLMS   (app.js: nlms)
    Module 4 – 제어 & 출력          (여기 HTML + app.js: playAudio, drawWave)
-->

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Realtime AudioSep + NLMS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Realtime AudioSep + NLMS</h1>

    <!-- Module 4: 컨트롤 패널 -->
    <div id="controls">

        <!-- 시작 버튼 -->
        <button id="startBtn">시작</button>

        <!-- 연결 / 처리 상태 표시 -->
        <span id="status" class="status-badge">대기 중</span>

        <!-- 타겟 소음 텍스트 쿼리 (Module 2 로 전송) -->
        <div class="control-row">
            <label for="queryInput">타겟 소음</label>
            <input
                type="text"
                id="queryInput"
                placeholder="예: vacuum cleaner"
                value="vacuum cleaner"
            >
            <button id="sendQueryBtn" disabled>적용</button>
        </div>

        <!-- NLMS 학습률 μ 실시간 조절 (Module 3) -->
        <div class="control-row">
            <label for="muSlider">학습률 μ</label>
            <input
                type="range"
                id="muSlider"
                min="0.001"
                max="0.5"
                step="0.001"
                value="0.05"
            >
            <span id="muLabel">0.050</span>
        </div>

    </div>

    <!-- Module 4: 파형 캔버스 — 입력/출력 분리 표시 -->
    <div id="canvas-container">

        <div class="canvas-block">
            <p class="canvas-label">입력 신호 (마이크)</p>
            <canvas id="inputCanvas"></canvas>
        </div>

        <div class="canvas-block">
            <p class="canvas-label">출력 신호 (노이즈 제거 후)</p>
            <canvas id="outputCanvas"></canvas>
        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
