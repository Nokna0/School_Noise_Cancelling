<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AudioSep + ALE 하이브리드 소음 제거</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>AudioSep + ALE 하이브리드 소음 제거</h1>

    <div id="controls">

        <div class="control-row">
            <button id="startBtn">시작</button>
            <span id="status" class="status-badge">대기 중</span>
        </div>

        <div class="control-row query-row">
            <label for="queryInput"></label>
            <input
                type="text"
                id="queryInput"
                placeholder="제거할 소음을 여기에 입력"
                
            >
        </div>

    </div>

    <div id="canvas-container">

        <div class="canvas-block">
            <p class="canvas-label">① 입력 d (마이크 원본 — 음성 + 소음)</p>
            <canvas id="inputCanvas"></canvas>
        </div>

        <div class="canvas-block">
            <p class="canvas-label">② 제거된 소음 y (= d - e)</p>
            <canvas id="noiseCanvas"></canvas>
        </div>

        <div class="canvas-block">
            <p class="canvas-label">③ 출력 e (소음 제거 후)</p>
            <canvas id="outputCanvas"></canvas>
        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
